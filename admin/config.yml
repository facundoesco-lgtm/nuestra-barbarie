backend:
  name: git-gateway
  branch: main

media_folder: "public/imagenes"
public_folder: "/imagenes"

collections:
  - name: "ensayos"
    label: "Ensayos"
    folder: "src/content/ensayos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Categoría", name: "categoria", widget: "select", options: ["Desde la tesis", "Reflexión", "Caso"] }
      - { label: "Resumen", name: "resumen", widget: "text" }
      - { label: "Destacado", name: "destacado", widget: "boolean", default: false, required: false }
      - { label: "Cuerpo", name: "body", widget: "markdown" }
